# GitHub Actions are managed by Renovate (renovate.json), which SHA-pins and
# bumps action digests. Keeping a github-actions block here too would produce
# duplicate bump PRs, so Dependabot owns only npm + cargo.
version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-minor-patch:
        update-types: ['minor', 'patch']
