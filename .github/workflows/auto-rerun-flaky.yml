name: Auto-rerun flaky failures

# Detects CI workflow runs whose ONLY failed jobs match a known-flaky
# pattern (the Playwright `e2e` job — browser/process-launch flake), and
# auto-reruns the failed jobs up to a bounded attempt count. Keeps the
# "update-branch + click-rerun" loop short for known-noisy CI signals.
#
# Why cron and not `workflow_run`?
# `workflow_run` events fire reliably only for runs on the default
# branch's history, not for feature-branch PR pushes (documented GitHub
# Actions quirk). A 10-min cron scan covers all branches uniformly.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch:
    inputs:
      max_attempts:
        description: 'Max workflow run attempts before giving up (default 3)'
        type: string
        required: false
        default: '3'
      window_minutes:
        description: 'Look-back window in minutes (default 90)'
        type: string
        required: false
        default: '90'

permissions:
  actions: write
  contents: read

concurrency:
  group: auto-rerun-flaky
  cancel-in-progress: false

jobs:
  scan-and-rerun:
    name: Scan recent CI runs and rerun if flaky
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Find failed CI runs in the look-back window
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MAX_ATTEMPTS: ${{ inputs.max_attempts || '3' }}
          WINDOW_MIN: ${{ inputs.window_minutes || '90' }}
        run: |
          set -euo pipefail

          # Known-flaky job-name substrings. A workflow run is only eligible
          # for auto-rerun if EVERY failed job in the run matches one of
          # these. Be conservative — a non-flaky pattern here would mask real
          # failures by auto-retrying them. Scoped to the Playwright e2e job.
          #
          # NOTE (tau-ui-specific): unlike the sibling repos, tau-ui's
          # `ci-summary` is a JOB INSIDE the "CI" workflow (ci.yml) with
          # `needs: [...e2e]` and fail-closed gating — so when `e2e` flakes,
          # the run's failed-jobs set is {e2e, ci-summary}. `ci-summary` is
          # therefore listed here: it only ever fails BECAUSE a need failed,
          # and the all-flaky guard below still blocks the rerun if any OTHER
          # failed job (rust/web/…) is not flaky. Omitting it would make the
          # guard unsatisfiable and the rerun never fire.
          flaky_patterns=(
            "e2e"        # Playwright/Chromium browser + gateway-process launch flake
            "ci-summary" # inline fail-closed gate; fails only because e2e did
          )

          # ISO-8601 cutoff: now - WINDOW_MIN (GNU date or BSD date).
          cutoff=$(date -u -d "$WINDOW_MIN minutes ago" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || \
                   date -u -v-"${WINDOW_MIN}"M +"%Y-%m-%dT%H:%M:%SZ")
          echo "Scanning CI runs since $cutoff (max_attempts=$MAX_ATTEMPTS)"

          # NB: `gh api --jq` takes a SINGLE jq-program string and does not
          # forward `--arg`; pipe the raw JSON to real `jq --arg` instead so
          # the cutoff is bound as a jq variable (not interpolated into the
          # program). shellcheck disable=SC2016 — $cutoff is a jq var here.
          # shellcheck disable=SC2016
          mapfile -t failed_run_ids < <(
            gh api "repos/$REPO/actions/runs?status=failure&per_page=30" \
              | jq -r --arg cutoff "$cutoff" \
                '.workflow_runs[] | select(.name == "CI" and .created_at > $cutoff) | .id'
          )

          if [ "${#failed_run_ids[@]}" -eq 0 ]; then
            echo "No failed CI runs in window — nothing to do."
            exit 0
          fi

          echo "Failed CI runs in window: ${failed_run_ids[*]}"

          for run_id in "${failed_run_ids[@]}"; do
            echo "::group::Evaluating run $run_id"

            run_info=$(gh api "repos/$REPO/actions/runs/$run_id" \
              --jq '{attempt: .run_attempt, head_sha, head_branch, event}')
            attempt=$(echo "$run_info" | jq -r '.attempt')
            sha=$(echo "$run_info" | jq -r '.head_sha')
            branch=$(echo "$run_info" | jq -r '.head_branch')

            echo "attempt=$attempt sha=${sha:0:7} branch=$branch"

            if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
              echo "Already at attempt $attempt (>= max $MAX_ATTEMPTS) — skipping."
              echo "::endgroup::"
              continue
            fi

            mapfile -t failed_jobs < <(
              gh api "repos/$REPO/actions/runs/$run_id/jobs?filter=latest" \
                --jq '.jobs[] | select(.conclusion == "failure") | .name'
            )

            if [ "${#failed_jobs[@]}" -eq 0 ]; then
              echo "No failed jobs (likely succeeded on most recent attempt) — skipping."
              echo "::endgroup::"
              continue
            fi

            echo "Failed jobs: ${failed_jobs[*]}"

            all_flaky=true
            for job in "${failed_jobs[@]}"; do
              matched=false
              for pattern in "${flaky_patterns[@]}"; do
                case "$job" in
                  *"$pattern"*) matched=true; break ;;
                esac
              done
              if [ "$matched" = "false" ]; then
                echo "Job '$job' is NOT in flaky list — will not rerun."
                all_flaky=false
                break
              fi
            done

            if [ "$all_flaky" = "true" ]; then
              echo "All failed jobs are flaky — rerunning (attempt $((attempt + 1)) of $MAX_ATTEMPTS)"
              gh api -X POST "repos/$REPO/actions/runs/$run_id/rerun-failed-jobs" \
                || echo "::warning::rerun API call failed (likely no longer in rerunnable state)"
            fi
            echo "::endgroup::"
          done
