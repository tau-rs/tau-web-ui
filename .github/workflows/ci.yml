name: CI

# CONTRACT
# --------
# `ci-summary` is the single status check branch protection should
# require on `main`. It is green only when every real job (rust, web,
# e2e) either SUCCEEDED or was legitimately SKIPPED — never green while
# a job failed or was cancelled (fail-closed gating).
#
# MERGE QUEUE
# -----------
# `merge_group` runs the full suite on the queue's temporary branch so
# `ci-summary` reports there — required for the merge queue to dequeue
# and merge a PR. Without this trigger, queued PRs hang forever waiting
# on a check that never runs.
#
# DOCS-ONLY PRs
# -------------
# The `changes` job decides whether any non-docs file changed. On a
# pull request, the heavy jobs gate on its `code` output, so a docs/
# markdown-only PR skips rust/web/e2e while `changes` + `ci-summary`
# still run and report green. Pushes to `main` and `merge_group` runs
# always run the full suite (fail-closed on the protected branch,
# independent of paths-filter's push-diff base resolution). (Workflow-
# level `paths-ignore` is intentionally NOT used: it would skip
# `ci-summary` too and leave the required check stuck "pending"
# forever.)
#
# CACHE INTEGRITY
# ---------------
# Superseded runs are cancelled EXCEPT on `main`, where Swatinem/
# rust-cache writes the cache. Cancelling a main run mid-write means
# the write never completes and later PRs restore a stale cache.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      # The paths-filter only powers the docs-only PR optimization. On
      # push to main and in the merge queue (merge_group) the heavy jobs
      # run unconditionally, so the filter is skipped there — its push-diff
      # base is unreliable on the queue's temporary branch. The job itself
      # still succeeds (empty `code` output), so downstream `needs: changes`
      # jobs are not skipped.
      - uses: actions/checkout@v6
        if: ${{ github.event_name == 'pull_request' }}
      - uses: dorny/paths-filter@v4
        if: ${{ github.event_name == 'pull_request' }}
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  rust:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: build (workspace bins incl. fake-tau-serve)
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace
      - name: ts-rs type-gen drift gate
        run: |
          if ! git diff --quiet -- web/src/types; then
            echo "::error::web/src/types is stale. The Rust Trace model changed without regenerating TS types."
            echo "Run 'cargo test -p tau-gateway' locally and commit the updated web/src/types/*.ts."
            git diff -- web/src/types
            exit 1
          fi

  web:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm vitest run
      - run: pnpm build

  e2e:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build gateway + mock
        run: cargo build --workspace
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: install chromium
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: e2e
        working-directory: web
        run: pnpm e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

  ci-summary:
    name: ci-summary
    needs: [changes, rust, web, e2e]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify required jobs passed or were skipped
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          if echo "$results" | jq -e \
            'to_entries | map(select(.value.result != "success" and .value.result != "skipped")) | length > 0' \
            >/dev/null; then
            echo "::error::A required job failed or was cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped (docs-only)."
