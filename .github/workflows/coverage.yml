name: coverage

# Measurement, not gating. Coverage is a signal to inform refactors and
# spot zero-coverage modules; never a hard threshold (a hard gate
# incentivizes test-for-coverage-not-correctness).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  coverage:
    name: cargo llvm-cov nextest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Install cargo-llvm-cov + nextest
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912  # v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Build mock into target/debug
        # The gateway e2e tests spawn <workspace>/target/debug/fake-tau-serve
        # by a hardcoded path. llvm-cov builds into target/llvm-cov-target, so
        # without this step that binary is absent and every e2e test fails with
        # connection-refused. A plain build leaves the mock where the tests look.
        run: cargo build --workspace
      - name: Generate lcov coverage
        run: |
          cargo llvm-cov nextest \
            --workspace --no-fail-fast \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|/target/|/build\.rs$)'
      - name: Summarise coverage
        run: |
          covered=$(grep -h '^DA:' lcov.info | awk -F, '$2!="0"{c++} END{print c+0}')
          total=$(grep -h '^DA:' lcov.info | wc -l)
          if [ "$total" -gt 0 ]; then
            pct=$(awk "BEGIN{printf \"%.1f\", ($covered/$total)*100}")
          else
            pct="0.0"
          fi
          {
            echo "## Coverage baseline"
            echo
            echo "- **Line coverage:** ${pct}% (${covered} / ${total})"
            echo "- LCOV artifact attached to this run."
            echo
            echo "Coverage is a signal, not a gate."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: lcov-${{ github.sha }}
          path: lcov.info
          retention-days: 14
