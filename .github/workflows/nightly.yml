name: Nightly (T3)

# T3 — scheduled drift-catcher.
#
# Runs the full OS matrix + e2e on a daily schedule to catch env / dep
# drift that the <10 min T1 fast gate skips, plus a scheduled OSV scan
# over the cargo + pnpm dependency trees. NEVER runs on pull_request or
# merge_group, so the PR path is untouched.
#
# Single-sourcing: shares the build/test/e2e shape with heavy.yml. When
# `just nightly` / `just heavy` land (brief 101) these should call the
# shared verb; inlined (self-contained per the anti-drift "B" principle)
# until then.

on:
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC daily, off-peak
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix:
    name: nightly / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: 'false'
      - name: build workspace (locked)
        run: cargo build --workspace --locked
      - name: test (locked)
        run: cargo test --workspace --locked
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: build web
        working-directory: web
        run: pnpm build
      # e2e on Linux only — see heavy.yml for rationale (playwright.config.ts
      # pins unix paths). The matrix still covers build+test on all 3 OSs.
      - name: install chromium (+ system deps, Linux)
        if: runner.os == 'Linux'
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: e2e (full, Linux)
        if: runner.os == 'Linux'
        working-directory: web
        run: pnpm e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() && runner.os == 'Linux' }}
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

  osv-scan:
    name: osv dependency scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Recursively discovers Cargo.lock + web/pnpm-lock.yaml and scans them
      # against the OSV database. Fails the job on a known advisory so the
      # scheduled run notifies — the drift-catcher for dependency CVEs the
      # T1 `pnpm audit` gate doesn't cover on the Rust side.
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./
